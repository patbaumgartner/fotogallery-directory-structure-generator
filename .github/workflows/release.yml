name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Rename JAR for release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          JAR=$(find target -maxdepth 1 -name "*.jar" -not -name "*.jar.original" | head -1)
          cp "$JAR" "fotogallery-directory-structure-generator-${VERSION}.jar"
          echo "JAR=fotogallery-directory-structure-generator-${VERSION}.jar" >> "$GITHUB_ENV"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: ${{ env.JAR }}
          retention-days: 1

  release:
    needs: [ build-jar ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: release-jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.jar"
          generate_release_notes: true
